spring:
  application:
    name: clean_alba_backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  sql:
    init:
      encoding: UTF-8
  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true
  flyway:
    enabled: false
kakao:
  client-id: "${KAKAO_CLIENT_ID}"        #카카오 디벨로퍼스에서 발급받은 rest api키
  client-secret: "${KAKAO_CLIENT_SECRET}"    #카카오 디벨로퍼스 -> 내 앱 -> 보안 에서 발급받은 시크릿 키
  redirect-url: "https://clean-alba-map.vercel.app/kakao/auth-code"
  # 로그인 성공 후 카카오가 인가코드를 들고 돌아올 프론트 주소
jwt:
  secret: "${JWT_SECRET}"
    # jwt 서명에 사용하는 비밀 키, 절대 외부에 노출되면 안됨
  expiration-ms: 86400000 # 토큰 유효시간\

admin:
  ids: "${ADMIN_IDS}"
upstage:
  # 후기 순화(Solar) API 키. 코드에 하드코딩하지 않고 환경변수 UPSTAGE_API_KEY에서 읽는다.
  api-key: "${UPSTAGE_API_KEY}"
app:
  seed:
    real-data:
      enabled: "${REAL_DATA_SEED_ENABLED:false}"
attachment:
  storage:
    # 운영(EC2)은 프로필 없이 기동하므로 여기 값이 적용된다.
    # 인증은 Access Key 없이 EC2 IAM 역할(DefaultCredentialsProvider)을 사용한다.
    # local/test 프로필은 각자 type: memory 로 덮어쓴다.
    type: s3
    bucket: cleanalba-attachments-759542245392-ap-southeast-2-an
    region: ap-southeast-2
