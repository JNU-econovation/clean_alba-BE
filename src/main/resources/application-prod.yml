spring:
  datasource:
    url: "${SPRING_DATASOURCE_URL}"
    username: "${SPRING_DATASOURCE_USERNAME}"
    password: "${SPRING_DATASOURCE_PASSWORD}"
  jpa:
    hibernate:
      ddl-auto: validate
    # Flyway와 defer-datasource-initialization=true(베이스 설정, H2 시드용)를 함께 켜면
    # flyway ↔ entityManagerFactory 순환 의존으로 기동이 실패한다. 운영은 Flyway가
    # 스키마를 만들므로 이 플래그를 끈다. (Flyway 실행 → JPA validate 순서 보장)
    defer-datasource-initialization: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

attachment:
  storage:
    type: s3
    bucket: "${ATTACHMENT_S3_BUCKET}"
    region: "${AWS_REGION}"
