# 로컬 전용 프로파일 (spring.profiles.active=local 일 때만 적용).
# H2 콘솔로 DB를 직접 확인하려는 용도. 운영(EC2)은 이 프로파일로 뜨지 않으므로
# /h2-console 이 절대 노출되지 않는다.
spring:
  # 콘솔에서 접속할 수 있도록 인메모리 H2의 JDBC URL을 고정한다.
  # (프로파일 없이 뜨면 URL이 매번 랜덤이라 콘솔에서 붙을 수 없다)
  # DB_CLOSE_DELAY=-1: JVM이 살아있는 동안 데이터 유지. 단, 앱을 종료하면 사라진다.
  datasource:
    url: "jdbc:h2:mem:cleanalba;DB_CLOSE_DELAY=-1"
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update

attachment:
  storage:
    type: memory
